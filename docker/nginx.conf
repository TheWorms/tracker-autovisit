server {
    listen 80 default_server;
    server_name _;
    root /var/www/autovisit;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /auth/check { internal; proxy_pass http://127.0.0.1:8099/auth/check; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; proxy_pass_request_body off; proxy_set_header Content-Length ""; }
    location = /login.js { add_header Cache-Control "no-store"; }
    location = /addsite.js { auth_request /auth/check; add_header Cache-Control "no-store"; }
    location = /index.html { add_header Cache-Control "no-store"; }

    # status.json passe par le service (protégé par l'auth quand elle est activée)
    location = /status.json {
        proxy_pass http://127.0.0.1:8099/status;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~ ^/auth/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location ~ ^/(test|confirm|cancel|delete|toggle|sites|site|settings|favicon|logosync|inspect|logs|favsync|refreshall|refreshstate|revisit|revisitstate|sitestats|siterestore)$ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        client_max_body_size 4m;
        proxy_connect_timeout 20s;
        proxy_send_timeout 200s;
        proxy_read_timeout 200s;
    }
}
