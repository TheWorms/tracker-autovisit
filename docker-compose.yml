services:
  malinois:
    build: .
    image: malinois:latest
    container_name: malinois
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Paris}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 6 * * *}
    ports:
      - "${Malinois_PORT:-8080}:80"
    volumes:
      # Toutes les données persistantes (configs sites, cookies, logs, status, sauvegardes)
      - ./data:/opt/tracker-autovisit/data
      # Icônes custom uploadées via l'UI (rangées sous ./data pour une sauvegarde unique)
      - ./data/_webicones:/var/www/autovisit/icones

  # Solveur Cloudflare — Byparr par défaut. Alternative FlareSolverr commentée plus bas.
  # Astuce : pour lancer FlareSolverr SANS rien décommenter, surcharge simplement l'image
  # (les variables HOST/PORT/LOG_LEVEL sont communes aux deux solveurs) :
  #   BYPARR_IMAGE=ghcr.io/flaresolverr/flaresolverr:latest docker compose up -d
  byparr:
    image: ${BYPARR_IMAGE:-ghcr.io/thephaseless/byparr:latest}
    container_name: malinois-byparr
    restart: unless-stopped
    shm_size: "2gb"
    environment:
      - TZ=${TZ:-Europe/Paris}
      - HOST=127.0.0.1
      - PORT=8191
      - LOG_LEVEL=info
    # Partage la pile réseau de malinois : Byparr écoute sur 127.0.0.1:8191,
    # exactement comme l'attendent les configs sites.d (cf_solver) -> zéro modif.
    network_mode: "service:malinois"
    depends_on:
      - malinois

  # --- Alternative : FlareSolverr (même API /v1, même port 8191 que Byparr) ---
  # ⚠️ Byparr et FlareSolverr écoutent TOUS LES DEUX sur 8191 : n'en garde qu'UN actif.
  #    Pour basculer : commente le service "byparr" ci-dessus, puis décommente ce bloc.
  # flaresolverr:
  #   image: ${FLARESOLVERR_IMAGE:-ghcr.io/flaresolverr/flaresolverr:latest}
  #   container_name: malinois-flaresolverr
  #   restart: unless-stopped
  #   shm_size: "2gb"
  #   environment:
  #     - TZ=${TZ:-Europe/Paris}
  #     - HOST=127.0.0.1
  #     - PORT=8191
  #     - LOG_LEVEL=info
  #   # Même pile réseau que malinois -> 127.0.0.1:8191 (cf_solver), zéro modif côté sites.
  #   network_mode: "service:malinois"
  #   depends_on:
  #     - malinois
